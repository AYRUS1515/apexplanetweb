<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonCart | Future Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">⚡ Loading NeonCart...</div>

<header class="navbar">
<h2 class="logo">⚡ NeonCart</h2>
<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#" id="cartBtn">Cart (<span id="cartCount">0</span>)</a>
<a href="login.html" id="authLink">Login</a>
</nav>
</header>

<section class="hero">
<h1>Future Shopping Experience</h1>
<p>Neon Multi-Color Glowing Store</p>
</section>

<section class="filters">
<input type="text" id="searchInput" placeholder="Search...">
<select id="categoryFilter">
<option value="all">All</option>
<option value="tech">Tech</option>
<option value="fashion">Fashion</option>
</select>
</section>

<section id="products" class="product-grid"></section>

<div id="cartSidebar" class="sidebar">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<h4>Total: ₹<span id="totalPrice">0</span></h4>
<button onclick="goCheckout()">Checkout</button>
</div>

<div id="toast" class="toast">Added to Cart</div>
<button id="topBtn">↑</button>

<script src="main.js"></script>
</body>
</html>
